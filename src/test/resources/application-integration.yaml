micronaut:
  server:
    port: -1

datasources:
  default:
    url: "jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1"
    username: admin
    password: admin
    driver-class-name: org.h2.Driver
    dialect: H2

jpa:
  default:
    properties:
      hibernate:
        hbm2ddl:
          auto: update

monobank:
  base-url: "http://localhost:8080"
