micronaut:
  application:
    name: budgetbot
  server:
    port: 7070
  http:
    client:
      read-timeout: 10s
      connect-timeout: 5s

datasources:
  default:
    url: jdbc:h2:file:./data/database
    driver-class-name: org.h2.Driver
    username: admin
    password: admin
    dialect: H2

jpa:
  default:
    properties:
      hibernate:
        hbm2ddl:
          auto: update
        dialect: org.hibernate.dialect.H2Dialect

monobank:
  base-url: ${MONOBANK_BASE_URL:`https://api.monobank.ua`}
  webhook-public-url: ${MONOBANK_WEBHOOK_PUBLIC_URL:}
  webhook-secret: ${MONOBANK_WEBHOOK_SECRET:}

endpoints:
  health:
    enabled: true
    sensitive: false
